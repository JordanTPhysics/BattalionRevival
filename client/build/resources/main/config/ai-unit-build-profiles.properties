# AI build behavior tuning.
# Format per unit:
#   <UnitType>.bias=<number>
#   <UnitType>.goodVs=<comma-separated tags>
#   <UnitType>.badVs=<comma-separated tags>
#   <UnitType>.goodAt=<comma-separated tags>
#
# Supported tags:
#   LIGHT, MEDIUM, HEAVY, LAND, NAVAL, AIR, RANGED, CLOAKED, CAPTURE, ANTI_AIR
#
# Notes:
# - Higher bias makes the AI build that unit more often.
# - goodVs increases score when enemies matching those tags are common.
# - badVs decreases score in those matchups.
# - goodAt boosts score based on map objectives (currently CAPTURE).

Commando.bias=1.10
Commando.goodVs=LIGHT,LAND
Commando.badVs=HEAVY,AIR
Commando.goodAt=CAPTURE

