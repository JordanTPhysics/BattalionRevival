spring.application.name=battalion-server

server.port=8080

# Default matches docker-compose Postgres (database battalion). Override via repo-root `.env`
# (see `.env.example`) or OS env: SPRING_DATASOURCE_URL (jdbc:postgresql://...), USERNAME, PASSWORD.
spring.datasource.url=jdbc:postgresql://localhost:5432/battalion
spring.datasource.username=battalion
spring.datasource.password=battalion

# Runs classpath schema.sql on startup (CREATE TABLE IF NOT EXISTS).
spring.sql.init.mode=always

# Browser SPA dev servers (comma-separated). Add your production web origin when deploying.
battalion.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,https://battalionrevival.netlify.app/

