spring.application.name=battalion-server-prod
server.port=8080

battalion.shared-maps.directory=shared-maps

# Browser REST (/api/**) from your deployed Next/Netlify site — comma-separated, exact origins (scheme + host + port).
# Example: battalion.cors.allowed-origins=https://your-app.netlify.app,https://www.yourdomain.com
# Without this, lobby/map fetches from production show “Failed to fetch” in the browser (CORS).
battalion.cors.allowed-origins=https://battalionrevival.netlify.app/
