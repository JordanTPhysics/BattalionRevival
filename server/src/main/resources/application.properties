spring.application.name=battalion-server

server.port=8080

# Directory for uploaded / shared map JSON (relative to JVM working directory unless absolute).
battalion.shared-maps.directory=shared-maps

# Browser SPA dev servers (comma-separated). Add your production web origin when deploying.
battalion.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,https://battalionrevival.netlify.app/

